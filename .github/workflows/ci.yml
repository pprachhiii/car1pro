name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      # Updated to v4 for Node 20+ compatibility
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install and Test
        run: |
          npm ci
          # Ensure prisma is available; removing --no-install can help if the binary is missing
          npx prisma generate
          npm run lint --if-present
          if grep -q "\"test\":" package.json; then
            npm test
          else
            echo "No tests defined, skipping"
          fi
        working-directory: ./

  deploy:
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Build
        run: |
          npm ci
          npx prisma generate
          npm run build
        working-directory: ./

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20 # Using a more maintained Vercel action
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
name: CI/CD Pipeline

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_ALLOW_UNSECURE_NODE_VERSION: true
  NODE_OPTIONS: "--max_old_space_size=4096"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies and generate Prisma
        run: |
          npm ci
          npx prisma generate
        working-directory: ./

      - name: Lint and test
        run: |
          npm run lint
          if [ -f package.json ] && grep -q "\"test\"" package.json; then
            npm test
          else
            echo "No tests defined, skipping"
        working-directory: ./

  deploy:
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies, generate Prisma, and build
        run: |
          npm ci
          npx prisma generate
          npm run build
        working-directory: ./

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./
          prod: true